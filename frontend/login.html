<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Dashboard ITBI-SP</title>
<link rel="icon" type="image/png" href="/dashboard/assets/logo-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000000;--surface:#0d0d0d;--surface-2:#161616;
    --ink:#f5f5f5;--ink-2:#b8b8b8;--mu:#808080;
    --line:#1e1e1e;--line-2:#2a2a2a;
    --primary:#e08560;--primary-ink:#f0a484;--primary-soft:#e0856022;
    --err:#ff7a7a;--ok:#5dd29c;
    --r-card:20px;--r-input:16px;--r-pill:999px;
    --shadow-lg:0 18px 50px #000a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Plus Jakarta Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
       background:var(--bg);color:var(--ink);letter-spacing:-.005em;
       display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;
       position:relative;overflow:hidden}

  /* ─── grid + glow de fundo (mesmo estilo da landing page) ─── */
  .bg-grid{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:linear-gradient(to right,#ffffff08 1px,transparent 1px),
                      linear-gradient(to bottom,#ffffff08 1px,transparent 1px);
    background-size:44px 44px;
  }
  .glow{
    position:fixed;z-index:0;pointer-events:none;border-radius:9999px;
    background:var(--primary);opacity:.18;filter:blur(120px);
  }
  .glow-1{width:640px;height:640px;top:-220px;left:-160px;animation:float1 16s ease-in-out infinite}
  .glow-2{width:560px;height:560px;bottom:-240px;right:-160px;animation:float2 18s ease-in-out infinite}
  @keyframes float1{
    0%,100%{transform:translate(0,0) scale(1)}
    50%{transform:translate(60px,40px) scale(1.15)}
  }
  @keyframes float2{
    0%,100%{transform:translate(0,0) scale(1)}
    50%{transform:translate(-50px,-30px) scale(1.1)}
  }

  .card{position:relative;z-index:1;background:var(--surface);border:1px solid var(--line);
        border-radius:var(--r-card);padding:38px 34px;width:100%;max-width:400px;
        box-shadow:var(--shadow-lg)}
  .logo{display:block;width:46px;height:46px;border-radius:13px;margin:0 0 20px;object-fit:cover}
  h1{font-size:1.35rem;margin:0 0 5px;font-weight:700;letter-spacing:-.02em}
  p.sub{color:var(--mu);font-size:.88rem;margin:0 0 26px;line-height:1.5}

  /* ─── seletor Entrar / Criar conta (pílula segmentada) ─── */
  .tabs{display:flex;gap:4px;margin-bottom:22px;background:var(--surface-2);
        border:1px solid var(--line);border-radius:var(--r-pill);padding:4px}
  .tab{flex:1;padding:9px;text-align:center;border-radius:var(--r-pill);cursor:pointer;
       color:var(--mu);font-size:.85rem;font-weight:600;transition:all .18s;user-select:none}
  .tab:hover{color:var(--ink-2)}
  .tab.active{background:var(--primary);color:#fff;box-shadow:0 6px 18px var(--primary-soft)}

  label{display:block;font-size:.8rem;color:var(--mu);margin-bottom:7px;font-weight:500}
  input{width:100%;padding:13px 15px;margin-bottom:16px;background:var(--surface-2);
        border:1px solid var(--line-2);border-radius:var(--r-input);color:var(--ink);
        font-size:.95rem;font-family:inherit;transition:border-color .15s,box-shadow .15s}
  input::placeholder{color:var(--mu-2,#606060)}
  input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}

  /* campos exclusivos do cadastro */
  .only-cadastro{display:none}
  .row{display:flex;gap:12px}
  .row .col{flex:1;min-width:0}

  button{width:100%;padding:13px;border:none;border-radius:var(--r-pill);font-size:.95rem;
         font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:-.01em}
  .btn-primary{background:var(--primary);color:#fff;transition:filter .15s,transform .05s;
               box-shadow:0 8px 22px var(--primary-soft);margin-top:4px}
  .btn-primary:hover{filter:brightness(1.07)}
  .btn-primary:active{transform:translateY(1px)}
  .btn-primary:disabled{opacity:.55;cursor:not-allowed;box-shadow:none}
  .btn-link{background:none;color:var(--mu);text-decoration:underline;margin-top:12px;font-weight:500}
  .btn-link:hover{color:var(--ink-2)}

  .msg{font-size:.85rem;margin-bottom:16px;min-height:18px;line-height:1.4}
  .msg.err{color:var(--err)}
  .msg.ok{color:var(--ok)}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid #fff5;border-top-color:#fff;
        border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="card">
  <img class="logo" src="/dashboard/assets/logo-icon.png" alt="ITBI Smart">
  <h1>Dashboard ITBI-SP</h1>
  <p class="sub">Acesse sua conta para consultar os dados</p>

  <div class="tabs">
    <div class="tab active" id="tabLogin" onclick="trocarAba('login')">Entrar</div>
    <div class="tab" id="tabCadastro" onclick="trocarAba('cadastro')">Criar conta</div>
  </div>

  <div id="msg" class="msg"></div>

  <form id="form" onsubmit="enviar(event)">
    <div class="only-cadastro" id="camposCadastroTopo">
      <div class="row">
        <div class="col">
          <label>Nome</label>
          <input type="text" id="nome" autocomplete="given-name" placeholder="João" disabled>
        </div>
        <div class="col">
          <label>Sobrenome</label>
          <input type="text" id="sobrenome" autocomplete="family-name" placeholder="Silva" disabled>
        </div>
      </div>
      <label>Telefone</label>
      <input type="tel" id="telefone" autocomplete="tel" placeholder="(11) 91234-5678" oninput="mascaraTelefone(this)" disabled>
    </div>

    <label>E-mail</label>
    <input type="email" id="email" required autocomplete="email" placeholder="voce@exemplo.com">

    <label>Senha</label>
    <input type="password" id="senha" required minlength="6" autocomplete="current-password" placeholder="••••••••">

    <div id="linkEsqueciSenha" style="text-align:right;margin:-10px 0 16px">
      <a href="#" onclick="mostrarEsqueciSenha();return false;" style="color:var(--mu);font-size:.8rem;text-decoration:underline">Esqueceu a senha?</a>
    </div>

    <div class="only-cadastro" id="camposCadastroSenha">
      <label>Confirmar senha</label>
      <input type="password" id="senha2" minlength="6" autocomplete="new-password" placeholder="••••••••" disabled>
    </div>

    <button type="submit" class="btn-primary" id="btnSubmit">Entrar</button>
  </form>
</div>

<script>
const API=location.hostname==='localhost'?'http://localhost:8000':location.origin;
let modo='login';

/* Status de assinatura que já liberam o dashboard (sem passar pelo Stripe).
   Precisa espelhar a lista aceita pelo backend (main.py → exigir_assinatura_ativa). */
const ACESSO_LIBERADO=['active','trialing','dev'];

/* Se chegou aqui por assinatura pendente (token ainda válido), vai direto pro checkout */
(async function checarPendente(){
  const params=new URLSearchParams(location.search);
  const tokenReset=params.get('resetar');
  if(tokenReset){
    mostrarRedefinirSenha(tokenReset);
    return;
  }
  const token=localStorage.getItem('itbi_token');
  if(params.get('status')==='pendente' && token){
    document.querySelector('.card').innerHTML=`
      <img class="logo" src="/dashboard/assets/logo-icon.png" alt="ITBI Smart">
      <h1>Redirecionando para o pagamento…</h1>
      <p class="sub">Sua assinatura ainda não está ativa. Você será encaminhado ao checkout em instantes.</p>
      <button class="btn-link" onclick="logout()">Usar outra conta</button>`;
    await irParaCheckout(token);
    return;
  }
  if(params.get('verificado')==='1'){
    const msg=document.getElementById('msg');
    msg.className='msg ok';
    msg.textContent='E-mail confirmado! Faça login para continuar.';
  }
})();

async function irParaCheckout(token){
  try{
    const res=await fetch(`${API}/api/billing/checkout`,{
      method:'POST', headers:{Authorization:`Bearer ${token}`}
    });
    if(res.status===401){ logout(); return; }
    const chk=await res.json();
    if(chk.url){ location.href=chk.url; return; }
  }catch(e){}
  document.querySelector('.card').innerHTML+=`<p class="msg err">Não foi possível iniciar o pagamento. Tente novamente em instantes.</p>`;
}

function logout(){ localStorage.removeItem('itbi_token'); location.href='/dashboard/login.html'; }

function mostrarAguardandoVerificacao(email, textoTopo){
  document.querySelector('.card').innerHTML=`
    <img class="logo" src="/dashboard/assets/logo-icon.png" alt="ITBI Smart">
    <h1>Confirme seu e-mail</h1>
    <p class="sub">${textoTopo} Enviamos um link de confirmação para <strong>${email}</strong>. Verifique também a caixa de spam.</p>
    <div id="msgReenvio" class="msg"></div>
    <button class="btn-primary" id="btnReenviar" onclick="reenviarVerificacao('${email.replace(/'/g,"\\'")}')">Reenviar e-mail</button>
    <button class="btn-link" onclick="location.href='/dashboard/login.html'">Voltar ao login</button>`;
}

async function reenviarVerificacao(email){
  const btn=document.getElementById('btnReenviar');
  const msg=document.getElementById('msgReenvio');
  btn.disabled=true;
  try{
    await fetch(`${API}/api/auth/reenviar-verificacao`,{
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email})
    });
    msg.className='msg ok'; msg.textContent='E-mail reenviado.';
  }catch(e){
    msg.className='msg err'; msg.textContent='Falha de conexão. Tente novamente.';
  }
  btn.disabled=false;
}

function mostrarEsqueciSenha(){
  document.querySelector('.card').innerHTML=`
    <img class="logo" src="/dashboard/assets/logo-icon.png" alt="ITBI Smart">
    <h1>Esqueceu a senha?</h1>
    <p class="sub">Informe seu e-mail e enviaremos um link para redefinir sua senha.</p>
    <div id="msgEsqueci" class="msg"></div>
    <form id="formEsqueci" onsubmit="return enviarEsqueciSenha(event)">
      <label>E-mail</label>
      <input type="email" id="emailEsqueci" required autocomplete="email" placeholder="voce@exemplo.com">
      <button type="submit" class="btn-primary" id="btnEsqueci">Enviar link</button>
    </form>
    <button class="btn-link" onclick="location.href='/dashboard/login.html'">Voltar ao login</button>`;
}

async function enviarEsqueciSenha(ev){
  ev.preventDefault();
  const email=document.getElementById('emailEsqueci').value.trim();
  const btn=document.getElementById('btnEsqueci');
  const msg=document.getElementById('msgEsqueci');
  btn.disabled=true;
  try{
    await fetch(`${API}/api/auth/esqueci-senha`,{
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email})
    });
    msg.className='msg ok';
    msg.textContent='Se esse e-mail estiver cadastrado, enviamos um link de redefinição. Verifique também a caixa de spam.';
    document.getElementById('formEsqueci').style.display='none';
  }catch(e){
    msg.className='msg err'; msg.textContent='Falha de conexão. Tente novamente.';
    btn.disabled=false;
  }
  return false;
}

function mostrarRedefinirSenha(token){
  document.querySelector('.card').innerHTML=`
    <img class="logo" src="/dashboard/assets/logo-icon.png" alt="ITBI Smart">
    <h1>Nova senha</h1>
    <p class="sub">Escolha uma nova senha para sua conta.</p>
    <div id="msgRedefinir" class="msg"></div>
    <form id="formRedefinir" onsubmit="return enviarRedefinirSenha(event)">
      <label>Nova senha</label>
      <input type="password" id="novaSenha" required minlength="6" autocomplete="new-password" placeholder="••••••••">
      <label>Confirmar nova senha</label>
      <input type="password" id="novaSenha2" required minlength="6" autocomplete="new-password" placeholder="••••••••">
      <button type="submit" class="btn-primary" id="btnRedefinir">Salvar nova senha</button>
    </form>`;
  document.getElementById('formRedefinir').dataset.token=token;
}

async function enviarRedefinirSenha(ev){
  ev.preventDefault();
  const token=document.getElementById('formRedefinir').dataset.token;
  const s1=document.getElementById('novaSenha').value;
  const s2=document.getElementById('novaSenha2').value;
  const msg=document.getElementById('msgRedefinir');
  const btn=document.getElementById('btnRedefinir');
  if(s1!==s2){ msg.className='msg err'; msg.textContent='As senhas não coincidem.'; return false; }
  btn.disabled=true;
  try{
    const res=await fetch(`${API}/api/auth/redefinir-senha`,{
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token, nova_senha:s1})
    });
    const data=await res.json();
    if(!res.ok){ msg.className='msg err'; msg.textContent=data.detail||'Erro ao redefinir senha.'; btn.disabled=false; return false; }
    msg.className='msg ok'; msg.textContent='Senha redefinida! Redirecionando para o login…';
    document.getElementById('formRedefinir').style.display='none';
    setTimeout(()=>location.href='/dashboard/login.html',1500);
  }catch(e){
    msg.className='msg err'; msg.textContent='Falha de conexão. Tente novamente.';
    btn.disabled=false;
  }
  return false;
}

const CAMPOS_CADASTRO=['nome','sobrenome','telefone','senha2'];

function trocarAba(m){
  modo=m;
  const ehCadastro=m==='cadastro';
  document.getElementById('tabLogin').classList.toggle('active',!ehCadastro);
  document.getElementById('tabCadastro').classList.toggle('active',ehCadastro);
  document.getElementById('senha').setAttribute('autocomplete',ehCadastro?'new-password':'current-password');
  document.getElementById('btnSubmit').textContent=ehCadastro?'Criar conta':'Entrar';
  // mostra/oculta os campos extras e liga/desliga a validação nativa (required em campo oculto trava o submit)
  document.querySelectorAll('.only-cadastro').forEach(el=>el.style.display=ehCadastro?'block':'none');
  document.getElementById('linkEsqueciSenha').style.display=ehCadastro?'none':'block';
  CAMPOS_CADASTRO.forEach(id=>{
    const el=document.getElementById(id);
    el.disabled=!ehCadastro;          // desabilitado = não é enviado nem validado
    el.required=ehCadastro;
  });
  document.getElementById('msg').textContent=''; document.getElementById('msg').className='msg';
}

function mascaraTelefone(el){
  let v=el.value.replace(/\D/g,'').slice(0,11);
  if(v.length>6)      v=`(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
  else if(v.length>2) v=`(${v.slice(0,2)}) ${v.slice(2)}`;
  else if(v.length>0) v=`(${v}`;
  el.value=v;
}

async function enviar(ev){
  ev.preventDefault();
  const email=document.getElementById('email').value.trim();
  const senha=document.getElementById('senha').value;
  const msg=document.getElementById('msg');
  const btn=document.getElementById('btnSubmit');
  msg.className='msg'; msg.textContent='';

  let corpo={email,senha};
  if(modo==='cadastro'){
    const senha2=document.getElementById('senha2').value;
    if(senha!==senha2){ msg.className='msg err'; msg.textContent='As senhas não coincidem.'; return; }
    corpo={
      email, senha,
      nome:document.getElementById('nome').value.trim(),
      sobrenome:document.getElementById('sobrenome').value.trim(),
      telefone:document.getElementById('telefone').value.trim(),
    };
  }
  btn.disabled=true;

  try{
    const rota=modo==='login'?'/api/auth/login':'/api/auth/registrar';
    const res=await fetch(`${API}${rota}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(corpo)
    });
    const data=await res.json();

    if(!res.ok){
      if(res.status===403 && modo==='login'){
        mostrarAguardandoVerificacao(email, 'Sua conta ainda não foi confirmada.');
        return;
      }
      msg.className='msg err'; msg.textContent=data.detail||'Erro'; btn.disabled=false; return;
    }

    if(modo==='cadastro'){
      mostrarAguardandoVerificacao(email, 'Conta criada!');
      return;
    }

    localStorage.setItem('itbi_token',data.token);

    // verifica status da assinatura
    const me=await fetch(`${API}/api/auth/me`,{headers:{Authorization:`Bearer ${data.token}`}}).then(r=>r.json());
    if(ACESSO_LIBERADO.includes(me.assinatura_status)){
      location.href='/dashboard/';
      return;
    }

    // sem assinatura ativa → segue direto para o pagamento
    document.getElementById('form').style.display='none';
    msg.className='msg ok';
    msg.innerHTML='<span class="spin"></span>Redirecionando para o pagamento…';
    await irParaCheckout(data.token);
  }catch(e){
    msg.className='msg err'; msg.textContent='Falha de conexão com o servidor.';
    btn.disabled=false;
  }
}
</script>
</body>
</html>
